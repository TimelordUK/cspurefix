name: Bump Version and Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Prerelease suffix (leave empty for stable release)'
        required: false
        default: 'beta'
        type: string

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Install xmlstarlet
      run: sudo apt-get update && sudo apt-get install -y xmlstarlet

    - name: Get current version
      id: current
      run: |
        # Evaluate MSBuild property authoritatively (respects Directory.Build.props).
        VERSION=$(dotnet msbuild Directory.Build.props -getProperty:Version -nologo | tr -d '[:space:]')
        if [ -z "$VERSION" ]; then
          echo "Failed to read <Version> from Directory.Build.props" >&2
          exit 1
        fi
        echo "Current version: $VERSION"
        echo "version=$VERSION" >> $GITHUB_OUTPUT

        # Parse SemVer: strip prerelease suffix, then split MAJOR.MINOR.PATCH.
        BASE_VERSION="${VERSION%%-*}"
        IFS=. read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
        echo "major=$MAJOR" >> $GITHUB_OUTPUT
        echo "minor=$MINOR" >> $GITHUB_OUTPUT
        echo "patch=$PATCH" >> $GITHUB_OUTPUT

    - name: Calculate new version
      id: new
      run: |
        MAJOR=${{ steps.current.outputs.major }}
        MINOR=${{ steps.current.outputs.minor }}
        PATCH=${{ steps.current.outputs.patch }}
        BUMP="${{ github.event.inputs.bump }}"
        PRERELEASE="${{ github.event.inputs.prerelease }}"

        case "$BUMP" in
          major)
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            ;;
          minor)
            MINOR=$((MINOR + 1))
            PATCH=0
            ;;
          patch)
            PATCH=$((PATCH + 1))
            ;;
        esac

        NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
        if [ -n "$PRERELEASE" ]; then
          NEW_VERSION="${NEW_VERSION}-${PRERELEASE}"
        fi

        echo "New version: $NEW_VERSION"
        echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

    - name: Update Directory.Build.props
      run: |
        NEW_VERSION="${{ steps.new.outputs.version }}"

        # XPath-based in-place edit — no regex, proper XML parser.
        xmlstarlet ed --inplace \
          --update "/Project/PropertyGroup/Version" \
          --value "$NEW_VERSION" \
          Directory.Build.props

        # Verify via MSBuild evaluation (round-trip check).
        APPLIED=$(dotnet msbuild Directory.Build.props -getProperty:Version -nologo | tr -d '[:space:]')
        echo "Updated Directory.Build.props Version: $APPLIED"
        if [ "$APPLIED" != "$NEW_VERSION" ]; then
          echo "Version update failed: expected $NEW_VERSION, got $APPLIED" >&2
          exit 1
        fi

    - name: Commit version bump
      run: |
        NEW_VERSION="${{ steps.new.outputs.version }}"
        git add Directory.Build.props
        git commit -m "chore: Bump version to ${NEW_VERSION}"

    - name: Create and push tag
      run: |
        NEW_VERSION="${{ steps.new.outputs.version }}"
        TAG="v${NEW_VERSION}"

        git tag "$TAG"
        git push origin master
        git push origin "$TAG"

        echo "Created and pushed tag: $TAG"
        echo "tag=$TAG" >> $GITHUB_OUTPUT
      id: tag

    - name: Generate release notes
      id: release_notes
      run: |
        CURRENT_TAG="${{ steps.tag.outputs.tag }}"
        # Get the previous tag (excluding current)
        PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -n1)
        if [ -z "$PREV_TAG" ]; then
          PREV_TAG=$(git rev-list --max-parents=0 HEAD)
        fi

        echo "Generating changelog from $PREV_TAG to $CURRENT_TAG"

        # Generate changelog
        {
          echo "## What's Changed"
          echo ""
          git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s (%h)" --no-merges
          echo ""
          echo ""
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG}"
        } > release_notes.md

        cat release_notes.md

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ steps.tag.outputs.tag }}"
        PRERELEASE="${{ github.event.inputs.prerelease }}"

        # Determine if this is a prerelease
        if [ -n "$PRERELEASE" ]; then
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release_notes.md \
            --prerelease
        else
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release_notes.md
        fi

        echo "Created GitHub release: $TAG"

    - name: Summary
      run: |
        echo "## Version Bump and Release Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Previous version:** ${{ steps.current.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **New version:** ${{ steps.new.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Tag:** ${{ steps.tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Bump type:** ${{ github.event.inputs.bump }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "GitHub release created. NuGet publish workflow will now run automatically." >> $GITHUB_STEP_SUMMARY
